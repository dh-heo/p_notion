# Nginx 사이트 설정 — TLS 종료 후 Node(:3001) 로 전부 프록시.
# Node 단일 프로세스가 클라이언트(client/dist) · /api · /uploads 를 모두 서빙하므로
# Nginx 는 HTTPS 종료 + 단일 location 프록시만 담당한다.
#
# 설치:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/p_notion
#   sudo ln -s /etc/nginx/sites-available/p_notion /etc/nginx/sites-enabled/p_notion
#   # your.domain.com 을 실제 도메인으로 치환
#   sudo certbot --nginx -d your.domain.com      # Let's Encrypt 인증서 발급/자동 설정
#   sudo nginx -t && sudo systemctl reload nginx
#
# 인증서 발급 후 systemd 쪽 COOKIE_SECURE=true 가 의미를 갖는다 (HTTPS 위에서만 쿠키 전송).

upstream p_notion {
    server 127.0.0.1:3001;
}

# HTTP → HTTPS 리다이렉트 (ACME 챌린지는 통과)
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your.domain.com;

    # Let's Encrypt(certbot) 경로 — certbot --nginx 사용 시 자동 주입되기도 함
    ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;

    # 업로드 한도: 서버(multer)가 50MB 까지 허용하므로 여유 있게 맞춘다 (기본 1MB면 업로드가 막힘)
    client_max_body_size 50m;

    location / {
        proxy_pass http://p_notion;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
